context_scene_heading: '## Контекст сцены (используй именно этих персонажей и это количество)'
context_location_line_template: 'Локация: {name} — {description}'
context_npc_heading: 'Действующие лица:'
context_lore_title: 'Факты мира (опирайся на них, не выдумывай иное)'
context_episodic_heading: '## Воспоминания (ранее в приключении)'
context_enrichment_heading: '## Указание мастеру на этот ход'

enrichment_combat_ready: 'Назревает боевая ситуация. Опиши завязку боя кинематографично и подведи к началу столкновения, не разрешая бой полностью.'
enrichment_combat_deflected: 'Игрок пытается начать бой, но подходящего противника в этой сцене нет. Не отказывай игроку впрямую и не оставляй сцену «подвешенной» — сюжетно объясни, почему стычка не состоялась (враг сбежал, угроза оказалась ложной, цель ускользнула и т.п.), и веди повествование дальше.'
enrichment_requires_roll_template: 'Действие требует проверки ({label}). Обыграй НАЧАЛО броска в ролиплее: опиши попытку и предложи игроку сделать бросок, не определяя исход за него.'

combat_outcome_intro: |
  Бой только что завершился. Подведи итог сцены как ГМ: кинематографично опиши развязку и последствия схватки, опираясь на факты ниже. Не повторяй хронику дословно — перескажи художественно, 1-3 абзаца, и предложи игрокам, что делать дальше.

combat_outcome_summary_template: |
  Итог: {outcome_desc} ({ended_by}).
  Кто уцелел: {survivors_text}.
  Хроника боя:
  {log_tail}

compaction_system: 'Ты ведёшь краткий журнал кампании настольной RPG.'

compaction_user_template: |
  Ниже — журнал кампании (если есть) и новые ходы приключения. Обнови сжатую сводку: что произошло, ключевые решения партии, важные NPC/места/факты и статус главной цели. Пиши по-русски, компактно, без диалогов дословно. Верни только обновлённую сводку.

  Текущая сводка:
  {prev}

  Новые ходы:
  {transcript}
