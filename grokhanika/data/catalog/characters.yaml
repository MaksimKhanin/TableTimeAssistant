# Игровые персонажи (§15). equipped_weapon/equipped_armor/inventory/skills —
# ссылки (по id) на карточки в других файлах каталога; резолвятся вторым
# проходом загрузчика.

enzo:
  name: 'Энцо'
  description: 'Грохонец (полукровка человека и орка) из Нижних Граней Аники. Вырос в гетто рядом с гоблинской мафией — сначала бегал курьером, потом научился вскрывать замки и чужие кошельки. Ни революционерам, ни Культу Бурь не верит: слишком насмотрелся на обе стороны. Работает на того, кто платит, — но есть вещи, которые не продаст даже за золото. Архетип: Плут / Разбойник.'
  is_player: true
  base_strength: 3
  base_dexterity: 12
  base_wisdom: 5
  base_charisma: 8
  money: 0
  equipped_weapon: dagger
  equipped_armor: leather
  inventory: [small_heal, luck_talisman, inspiring_lute]

andryusha:
  name: 'Андрюша'
  description: 'Человек, бывший стражник третьего ранга в гарнизоне Аники. Вырос в рабочем квартале Средних Граней, записался в стражу ради стабильного жалования. Ушёл, когда понял, что Культ Бурь внутри — не слухи, а приказы командиров. Какое-то время провёл в пограничье в южных провинциях. Вел дозор в крепости Импродор. Теперь наёмник без политических предпочтений: к оркам и грохонцам относится спокойнее большинства, верит в честную работу и хорошую сталь. Архетип: Воин.'
  is_player: true
  base_strength: 12
  base_dexterity: 5
  base_wisdom: 3
  base_charisma: 5
  money: 1
  equipped_weapon: short_sword
  equipped_armor: chainmail
  inventory: [improdor_defender]

salli:
  name: 'Салли'
  description: 'Полуэльф из приграничья Тенелесья. Мать — эльфийка из Сильванара, отец — заезжий торговец, которого она никогда не знала. В лесу её принимали как чужую, в городе смотрели на неё как на диковинку. Стала следопытом: в Тенелесье нужны навыки, а не происхождение. Знает лесные тропы лучше большинства чистокровных эльфов, но в имперских городах чувствует себя не в своей тарелке. Насторожённо относится к промышленной экспансии Граней в лес. Архетип: Следопыт / Лучник.'
  is_player: true
  base_strength: 5
  base_dexterity: 10
  base_wisdom: 7
  base_charisma: 3
  money: 2
  equipped_weapon: homing_bow
  equipped_armor: leather
  inventory: [small_heal, magic_arrows]

arseldor:
  name: 'Арсельдор'
  description: 'Человек из Средних Граней, самоучка-маг. Магические способности открылись после случайного контакта с артефактом из Пустыни Смерти — предположительно технологией Анхари, которую он принял за волшебство. В центральных Гранях магия официально считается «архаизмом» и «варварством», поэтому практикует втайне. Одержим историей Анхари и убеждён, что их утраченные технологии и магия Гро — одно и то же явление. Собирает запрещённые книги. Архетип: Маг.'
  is_player: true
  base_strength: 3
  base_dexterity: 3
  base_wisdom: 14
  base_charisma: 5
  money: 0
  equipped_weapon: staff
  equipped_armor: mage_robes
  inventory: [vitality_amulet]
  skills: [skill_magic_arrows]
