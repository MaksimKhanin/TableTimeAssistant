<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DnD Game Master</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- VIEW: Home -->
    <div id="view-home" class="view active">
      <header class="top-bar">
        <h1>⚔️ DnD Game Master</h1>
        <button class="icon-btn" id="btn-settings" title="Настройки LLM">⚙️</button>
      </header>
      <div class="home-content">
        <button class="btn-primary full" id="btn-new-adventure">+ Новое приключение</button>
        <h2>Сохранённые приключения</h2>
        <div id="adventures-list"></div>
      </div>
    </div>

    <!-- VIEW: New Adventure -->
    <div id="view-new" class="view">
      <header class="top-bar">
        <button class="back-btn" data-target="home">← Назад</button>
        <h1>Новое приключение</h1>
      </header>
      <div class="form-content">
        <div class="form-group">
          <label>Название приключения</label>
          <input id="adv-title" type="text" placeholder="Тени Серебряного Леса..." />
        </div>
        <div class="form-group">
          <label>Описание мира и завязки</label>
          <textarea id="adv-desc" rows="4" placeholder="Мрачное средневековое королевство, охваченное чумой..."></textarea>
        </div>
        <div class="form-group">
          <label>Роль ведущего</label>
          <input id="adv-role" type="text" value="Dungeon Master" />
        </div>
        <div class="form-group">
          <label>Количество игроков</label>
          <select id="adv-players">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
          </select>
        </div>
        <div id="characters-forms"></div>

        <div class="section-divider">
          <span>NPC и враги</span>
          <button class="btn-secondary" id="btn-add-npc">+ Добавить</button>
        </div>
        <div id="npc-forms"></div>

        <button class="btn-primary full" id="btn-start-adventure">Начать приключение</button>
      </div>
    </div>

    <!-- VIEW: Game -->
    <div id="view-game" class="view">
      <header class="top-bar">
        <button class="back-btn" data-target="home">← Назад</button>
        <h1 id="game-title">Приключение</h1>
        <button class="icon-btn" id="btn-party">👥</button>
      </header>
      <div id="chat-messages"></div>
      <div class="input-area">
        <div class="player-select-row">
          <select id="player-select"></select>
          <button class="dice-btn" id="btn-dice-menu">🎲</button>
        </div>
        <div class="message-row">
          <textarea id="chat-input" rows="2" placeholder="Введите действие..."></textarea>
          <button class="send-btn" id="btn-send">➤</button>
        </div>
      </div>
    </div>

    <!-- VIEW: Party Panel (overlay) -->
    <div id="view-party" class="overlay hidden">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Отряд и NPC</h2>
          <button class="close-btn" id="btn-close-party">✕</button>
        </div>
        <div id="party-list"></div>
        <div id="npc-list"></div>
      </div>
    </div>

    <!-- VIEW: Settings -->
    <div id="view-settings" class="overlay hidden">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Настройки LLM</h2>
          <button class="close-btn" id="btn-close-settings">✕</button>
        </div>
        <div class="form-group">
          <label>URL Ollama</label>
          <input id="llm-url" type="text" placeholder="http://localhost:11434" />
        </div>
        <div class="form-group">
          <label>Модель</label>
          <input id="llm-model" type="text" placeholder="llama3" />
        </div>
        <div class="form-group">
          <label>Температура (0.1–2.0)</label>
          <input id="llm-temp" type="number" step="0.1" min="0.1" max="2.0" />
        </div>
        <div class="form-group">
          <label>Макс. токенов</label>
          <input id="llm-tokens" type="number" step="64" min="128" max="4096" />
        </div>
        <div id="llm-status" class="status-badge"></div>
        <button class="btn-primary full" id="btn-save-llm">Сохранить</button>
        <button class="btn-secondary full" id="btn-check-llm">Проверить соединение</button>
      </div>
    </div>

    <!-- VIEW: Dice Menu (overlay) -->
    <div id="view-dice" class="overlay hidden">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Бросок кубика</h2>
          <button class="close-btn" id="btn-close-dice">✕</button>
        </div>
        <div id="dice-options"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
